{% extends "base.html" %}

{% block title %}Add IPO{% endblock %}

{% block content %}
<nav class="navbar navbar-custom">
    <div class="container-fluid">
        <span class="navbar-brand">
            <i class="fas fa-plus-circle me-2"></i>
            Add New IPO
        </span>
        <div>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-primary btn-sm me-2">
                <i class="fas fa-arrow-left me-1"></i>Back
            </a>
            <a href="{{ url_for('logout') }}" class="btn btn-danger-custom btn-sm">
                <i class="fas fa-sign-out-alt me-1"></i>Logout
            </a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card-custom p-5">
                <h3 class="mb-4">
                    <i class="fas fa-building me-2"></i>
                    IPO Details
                </h3>

                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-semibold">Company Name</label>
                            <input type="text" name="company_name" class="form-control form-control-custom" 
                                   placeholder="Enter company name" required>
                        </div>

                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-semibold">Price Per Share (₹)</label>
                            <input type="number" step="0.01" name="price_per_share" class="form-control form-control-custom" 
                                   placeholder="Enter price" required min="0.01">
                        </div>

                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-semibold">Total Shares</label>
                            <input type="number" name="total_shares" class="form-control form-control-custom" 
                                   placeholder="Enter total shares" required min="1">
                        </div>

                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-semibold">Available Shares</label>
                            <input type="number" name="available_shares" class="form-control form-control-custom" 
                                   placeholder="Enter available shares" required min="1">
                        </div>

                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-semibold">Open Date</label>
                            <input type="date" name="open_date" class="form-control form-control-custom" required>
                        </div>

                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-semibold">Close Date</label>
                            <input type="date" name="close_date" class="form-control form-control-custom" required>
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-3">
                        <button type="submit" class="btn btn-custom btn-primary-custom">
                            <i class="fas fa-plus-circle me-2"></i>Add IPO
                        </button>
                        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary">
                            <i class="fas fa-times me-2"></i>Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
