{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">
            <i class="fas fa-user-plus me-2"></i>
            Create Account
        </h2>

        <form method="POST">
            <div class="mb-4">
                <label class="form-label fw-semibold">Full Name</label>
                <input type="text" name="name" class="form-control form-control-custom" placeholder="Enter your full name" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Email Address</label>
                <input type="email" name="email" class="form-control form-control-custom" placeholder="Enter your email" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <div class="password-container">
                    <input type="password" name="password" class="form-control form-control-custom" placeholder="Create a strong password" required minlength="12">
                    <button type="button" class="password-toggle">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-custom btn-primary-custom w-100 mb-3">
                <i class="fas fa-user-plus me-2"></i>Register
            </button>
        </form>

        <div class="text-center mt-3">
            <p class="text-muted">Already have an account? 
                <a href="{{ url_for('login') }}" class="text-decoration-none fw-semibold" style="color: var(--primary);">Login here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
