{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">
            <i class="fas fa-sign-in-alt me-2"></i>
            Welcome Back
        </h2>

        <form method="POST">
            <div class="mb-4">
                <label class="form-label fw-semibold">Email Address</label>
                <input type="email" name="email" class="form-control form-control-custom" placeholder="Enter your email" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <div class="password-container">
                    <input type="password" name="password" class="form-control form-control-custom" placeholder="Enter your password" required>
                    <button type="button" class="password-toggle">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-custom btn-primary-custom w-100 mb-3">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
        </form>

        <div class="text-center mt-3">
            <p class="text-muted">Don't have an account? 
                <a href="{{ url_for('register') }}" class="text-decoration-none fw-semibold" style="color: var(--primary);">Register here</a>
            </p>
            <p class="text-muted mt-2">
                <a href="{{ url_for('admin_login') }}" class="text-decoration-none" style="color: var(--secondary);">
                    <i class="fas fa-user-shield me-1"></i>Admin Login
                </a>
            </p>
        </div>

        <!-- Test Login Section -->
        <div class="test-login-section">
            <p class="text-center text-muted mb-2" style="font-size: 0.85rem;">
                <i class="fas fa-flask me-1"></i>Quick Test Login
            </p>
            <button type="button" class="test-login-btn" data-email="test@example.com" data-password="Test@123456">
                <i class="fas fa-user me-2"></i>Test User (₹100,000)
            </button>
            <button type="button" class="test-login-btn" data-email="demo@example.com" data-password="Test@123456">
                <i class="fas fa-user me-2"></i>Demo User (₹50,000)
            </button>
        </div>
    </div>
</div>
{% endblock %}
