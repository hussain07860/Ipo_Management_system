{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<nav class="navbar navbar-custom">
    <div class="container-fluid">
        <span class="navbar-brand">
            <i class="fas fa-tachometer-alt me-2"></i>
            Dashboard
        </span>
        <div>
            <span class="me-3 fw-semibold">
                <i class="fas fa-user-circle me-1"></i>
                {{ session.user_name }}
            </span>
            <a href="{{ url_for('user_home') }}" class="btn btn-outline-primary btn-sm me-2">
                <i class="fas fa-home me-1"></i>Home
            </a>
            <a href="{{ url_for('logout') }}" class="btn btn-danger-custom btn-sm">
                <i class="fas fa-sign-out-alt me-1"></i>Logout
            </a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="wallet-card animate-slide-in">
        <h4 class="mb-2">
            <i class="fas fa-wallet me-2"></i>
            Wallet Balance
        </h4>
        <div class="wallet-balance">₹ {{ "%.2f"|format(user[4]) }}</div>
        <div class="mt-4">
            <a href="{{ url_for('wallet') }}" class="btn btn-light me-2">
                <i class="fas fa-plus-circle me-2"></i>Add Money
            </a>
            <a href="{{ url_for('user_ipos') }}" class="btn btn-success-custom">
                <i class="fas fa-building me-2"></i>Browse IPOs
            </a>
        </div>
    </div>
</div>
{% endblock %}
