{% extends "base.html" %}

{% block title %}Home - IPO Management System{% endblock %}

{% block content %}
<div class="hero-section">
    <div class="container">
        <h1 class="hero-title">
            <i class="fas fa-chart-line me-3"></i>
            IPO Management System
        </h1>
        <p class="hero-subtitle">
            Invest in IPOs easily and manage your portfolio with confidence
        </p>

        <div class="mt-5">
            <a href="{{ url_for('login') }}" class="btn btn-custom btn-success-custom btn-lg m-2">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </a>
            <a href="{{ url_for('register') }}" class="btn btn-custom btn-primary-custom btn-lg m-2">
                <i class="fas fa-user-plus me-2"></i>Register
            </a>
        </div>

        <div class="row mt-5 pt-5">
            <div class="col-md-4 mb-4">
                <div class="stat-card">
                    <i class="fas fa-building fa-3x mb-3" style="color: var(--primary);"></i>
                    <div class="stat-number">50+</div>
                    <div class="stat-label">IPO Companies</div>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="stat-card">
                    <i class="fas fa-users fa-3x mb-3" style="color: var(--success);"></i>
                    <div class="stat-number">10K+</div>
                    <div class="stat-label">Active Investors</div>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="stat-card">
                    <i class="fas fa-rupee-sign fa-3x mb-3" style="color: var(--warning);"></i>
                    <div class="stat-number">₹100Cr+</div>
                    <div class="stat-label">Total Investment</div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
